<div id="holder">
    <span id="Text">
        Firebase Latest version
    </span>
    <span id="VersionCode">
        <span id="VersionCodeText"><b>- - -</b></span>
        <button onclick="copyVer()">
            <img height="20px"
                src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAAAU5JREFUSEvtlqFOA0EQhr/fgAeBQSABwwOQYMATDA6NAIclAQQWA3iCwyAwKB4ChwMBgoTwAk346TZc017bdDbXciR0zYqbf7+Z2dm5ETUt1cQlC2x7FVgDpjMdfgVuJX0WujDY9jFwlAnsNH8HViSlPR6x7Q9gtgI4SfclXeaCXRGa5CeSUuayIq4N3PI0sOaBLWCmj21+xAFg28T2XBP+CKS9c40XnEi2L4C9ENj2OpAEizkRAo1mxZ9LOih0A55fb8S2F4DnTGDZ/KyA54BTc4gW0CD/GpKmflLdr+H0jbhqZ2o5o+ZDnYA77uX/pfpQ0mlXrx7Bby9SXJuS7n4T/AbcA7uSvsYKHtaI2hPIqFM9AZcz8CdSvQ3cDLubId+fJC1Fzugab21fAzsR4QCbDUkPEX3PXG07Rb4cEZdsriS9RHXhgT56YNSuNvA31FStH0WOLeoAAAAASUVORK5CYII=" />
        </button>
    </span><br/><br/>
    <span id="clip_alert">
        Copied to clipboard!
    </span>
</div>


<style>
    body {
        overflow-y: hidden;
    }

    ::selection {
        color: #0B7CBD;
        background: white;
    }

    #holder {
        white-space: nowrap;
        font-family: Urbanist, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif, BlinkMacSystemFont,
            'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji',
            'Segoe UI Emoji', 'Segoe UI Symbol';
        font-size: 20px;
        color: white;
        max-width: 50px;
    }

    button {
        user-select: none;
        background-color: transparent;
        border-radius: 6px;
        border: none;
        outline: none;
        padding: 4px;
        vertical-align: middle;
    }

    img {
        vertical-align: middle;
        opacity: 0.7;
    }

    img:hover {
        opacity: 1.0;
    }

    #Text {
        background: #5B5B5B;
        border: 4px solid #5B5B5B;
        border-left: 10px solid #5B5B5B;
        border-right: 6px solid #5B5B5B;
        border-radius: 6px 0px 0px 6px;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.2);
    }

    #VersionCode {
        font-weight: bold;
        background: #0B7CBD;
        border: 4px solid #0B7CBD;
        border-right: 10px solid #0B7CBD;
        border-left: 8px solid #0B7CBD;
        border-radius: 0px 6px 6px 0px;
        box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.3);
    }

    #clip_alert{
        font-size: 12px;
        visibility: hidden;
        user-select: none;
        border-radius: 4px;
        background: #1B1B1D;
        box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.2);
        padding: 6px;
        font-weight: bold;
    }
</style>
<script>
    var ver;
    fetch('https://cdn.jsdelivr.net/npm/firebase@latest/package.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById("VersionCodeText").innerHTML = data.version;
            ver=data.version;
        });

    function copyVer(){
        navigator.clipboard.writeText(ver);
        document.getElementById("clip_alert").style.visibility="visible";
    }
</script>
